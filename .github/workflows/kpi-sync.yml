name: KPI Sync

on:
  schedule:
    # Run every Tuesday and Saturday at 10:00 AM KST (01:00 UTC)
    - cron: '0 1 * * 2,6'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Run KPI Sync
        env:
          ZENDESK_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_API_TOKEN }}
          ZENDESK_SUBDOMAIN: ${{ secrets.ZENDESK_SUBDOMAIN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 환경 변수 확인
          if [ -z "$ZENDESK_EMAIL" ] || [ -z "$ZENDESK_API_TOKEN" ] || [ -z "$ZENDESK_SUBDOMAIN" ] || \
             [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$OPENAI_API_KEY" ]; then
            echo "Error: Required environment variables are not set." >&2
            echo "Please check the following environment variables:" >&2
            echo "- ZENDESK_EMAIL" >&2
            echo "- ZENDESK_API_TOKEN" >&2
            echo "- ZENDESK_SUBDOMAIN" >&2
            echo "- SUPABASE_URL" >&2
            echo "- SUPABASE_SERVICE_ROLE_KEY" >&2
            echo "- OPENAI_API_KEY" >&2
            exit 1
          fi

          # Precompute 동기화 스크립트 실행
          echo "Starting metrics precompute sync..."
          npx ts-node --transpile-only scripts/sync-metrics.ts
          
          # 실행 결과 확인
          if [ $? -ne 0 ]; then
            echo "Error: metrics precompute sync failed" >&2
            exit 1
          fi
          
          echo "metrics precompute sync completed successfully"

      - name: Notify Slack on failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: 'KPI Sync Failed'
          SLACK_MESSAGE: 'KPI sync job failed. Check the GitHub Actions run for details.'
          SLACK_COLOR: 'danger'
